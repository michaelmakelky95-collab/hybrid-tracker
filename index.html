// localStorage-Wrapper
const storage = {
  set: (key, value) => { try { localStorage.setItem(key, value); } catch (e) {} },
  get: (key) => { const v = localStorage.getItem(key); return v ? { value: v } : null; },
  delete: (key) => { try { localStorage.removeItem(key); } catch (e) {} },
  list: (prefix) => {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix)) keys.push(k);
    }
    return { keys };
  }
};
 
// ============================================
// ZEIT-FORMAT HELFER (mm:ss <-> Dezimalminuten)
// ============================================
// "25:30" -> 25.5 (Minuten als Dezimalzahl)
const parseTime = (str) => {
  if (!str) return null;
  const s = str.toString().trim();
  if (s.includes(':')) {
    const parts = s.split(':');
    const min = parseInt(parts[0]) || 0;
    const sec = parseInt(parts[1]) || 0;
    return min + sec / 60;
  }
  // Fallback: reine Zahl als Minuten
  const num = parseFloat(s.replace(',', '.'));
  return isNaN(num) ? null : num;
};
 
// 25.5 -> "25:30"
const formatMinutesToTime = (minutes) => {
  if (minutes === null || minutes === undefined || minutes === '') return '';
  const min = Math.floor(minutes);
  const sec = Math.round((minutes - min) * 60);
  return `${min}:${sec.toString().padStart(2, '0')}`;
};
 
// Live-Validierung beim Tippen
const isValidTimeInput = (str) => {
  if (!str) return true;
  // Erlaubt: Zahlen + max ein Doppelpunkt
  return /^\d{0,3}(:\d{0,2})?$/.test(str);
};
 
const PACE_FACTORS = {
  GA1:       { min: 1.20, max: 1.35, name: 'GA1 (locker)',  desc: 'Lockeres Tempo, Unterhaltung in vollen Sätzen möglich. ~75-85% Maximalpuls.', tip: 'Anfangs fühlt sich das zu langsam an – genau richtig!' },
  GA2:       { min: 1.10, max: 1.20, name: 'GA2 (zügig)',   desc: 'Zügig, aber kontrollierbar. Sprechen nur in kurzen Sätzen.', tip: 'Achtung: Diese Zone wird oft überstrapaziert (Junk Mileage).' },
  Tempo:     { min: 0.95, max: 1.05, name: 'Tempolauf',     desc: 'Knapp unter 10-km-Wettkampftempo. Max. 20-30 Min am Stück.', tip: 'Hebt deine Laktatschwelle - wichtigster Hebel für Sub-40.' },
  Intervall: { min: 0.85, max: 0.95, name: 'Intervall',     desc: 'Kurze, sehr schnelle Abschnitte mit Trabpausen.', tip: 'Beispiel: 4-6× 1000m mit 2 min Trabpause.' },
  LongRun:   { min: 1.20, max: 1.35, name: 'Long Run',      desc: 'Wie GA1, aber 60-90 Min am Stück. Trainiert Fettstoffwechsel.', tip: 'Mit Kinderwagen perfekt machbar.' }
};
const getPaceRange = (best5kMin, type) => {
  const basePace = best5kMin / 5;
  const f = PACE_FACTORS[type];
  return { minPace: basePace * f.min, maxPace: basePace * f.max, name: f.name, desc: f.desc, tip: f.tip };
};

// ============================================
// SPLIT-DEFINITIONEN (editierbar!)
// ============================================
// Statt fester Konstante UK/OK/Full → Liste von Split-Objekten
const DEFAULT_SPLITS = [

const SPLIT_COLORS = {
  blue:   'bg-blue-500/20 text-blue-400',
  purple: 'bg-purple-500/20 text-purple-400',
  green:  'bg-green-500/20 text-green-400',
  orange: 'bg-orange-500/20 text-orange-400',
  red:    'bg-red-500/20 text-red-400',

  zinc:   'bg-zinc-600/40 text-zinc-300'

function HybridTracker() {
  const [activeTab, setActiveTab] = useState('dashboard');
  const [runs, setRuns] = useState([]);
  const [strengthSessions, setStrengthSessions] = useState([]);
  const [dailyLogs, setDailyLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [best5kTime, setBest5kTime] = useState(25);
  const [weeklyPlan, setWeeklyPlan] = useState(DEFAULT_WEEKLY_PLAN);
  const [splits, setSplits] = useState(DEFAULT_SPLITS);
  const [exercises, setExercises] = useState(DEFAULT_EXERCISES);
  const [editingRunId, setEditingRunId] = useState(null);
  const [editingStrengthId, setEditingStrengthId] = useState(null);
  const [editingDailyId, setEditingDailyId] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [editingExerciseSplit, setEditingExerciseSplit] = useState(null);
 
  // Refs zur Steuerung des Template-Resets
  // Idee: Template wird NUR geladen wenn der User aktiv den Split wechselt
  // oder die App neu öffnet - NIE während Edit/Eingabe
  const previousSplitType = useRef(null);
  const isInitialLoad = useRef(true);
 
  const [runForm, setRunForm] = useState({
    date: new Date().toISOString().split('T')[0],
    type: 'GA1',
    distance: '',
    durationStr: '', // jetzt String im mm:ss-Format
    notes: ''
  });
 
  const [strengthForm, setStrengthForm] = useState({
    date: new Date().toISOString().split('T')[0],
    type: 'UK',
    exerciseLog: [],
    notes: ''
  });
 
  const [dailyForm, setDailyForm] = useState({
    date: new Date().toISOString().split('T')[0],
    weight: '', kcal: '', protein: '', sleep: '', stress: 5
  });
 
  useEffect(() => { loadAllData(); }, []);
 
  // ============================================
  // TEMPLATE-LOGIK NEU:
  // Template wird nur geladen wenn:
  // 1. Initial nach App-Start (wenn kein Edit)
  // 2. User aktiv den Split wechselt (vorheriger Split != aktueller Split)
  // NIE wenn editingStrengthId gesetzt ist
  // NIE wenn exerciseLog bereits gefüllt ist und Split gleich bleibt
  // ============================================
  useEffect(() => {
    if (editingStrengthId) {
      // Im Edit-Modus: Template NIEMALS laden
      previousSplitType.current = strengthForm.type;
      return;
    }
 
    const splitChanged = previousSplitType.current !== null &&
                         previousSplitType.current !== strengthForm.type;
 
    // Template laden bei: erstem Lauf ODER Split-Wechsel
    if (isInitialLoad.current || splitChanged) {
      const template = exercises[strengthForm.type] || [];
      const exerciseLog = template.map(ex => ({
        name: ex.name,
        plannedSets: ex.sets,
        repsTarget: ex.repsTarget,
        rirTarget: ex.rirTarget,
        sets: Array.from({ length: ex.sets }, () => ({
          reps: '', weight: '',
          rir: ex.rirTarget !== undefined && ex.rirTarget !== null ? ex.rirTarget.toString() : ''
        }))
      }));
      setStrengthForm(f => ({ ...f, exerciseLog }));
      isInitialLoad.current = false;
    }
 
    previousSplitType.current = strengthForm.type;
  }, [strengthForm.type, editingStrengthId]);
 
  // Wenn exercises-Templates aktualisiert werden (User editiert Vorlagen),
  // aktualisiere die strengthForm NUR wenn keine Werte eingetragen sind und kein Edit
  useEffect(() => {
    if (editingStrengthId) return;
    const hasAnyValues = strengthForm.exerciseLog.some(ex =>
      ex.sets.some(s => s.weight !== '' || s.reps !== '')
    );
    if (hasAnyValues) return; // Werte schon drin - nicht überschreiben!
 
    const template = exercises[strengthForm.type] || [];
    const exerciseLog = template.map(ex => ({
      name: ex.name,
      plannedSets: ex.sets,
      repsTarget: ex.repsTarget,
      rirTarget: ex.rirTarget,
      sets: Array.from({ length: ex.sets }, () => ({
        reps: '', weight: '',
        rir: ex.rirTarget !== undefined && ex.rirTarget !== null ? ex.rirTarget.toString() : ''
      }))
    }));
    setStrengthForm(f => ({ ...f, exerciseLog }));
  }, [exercises]);
 
  const loadAllData = () => {
    try {
      const runsData = loadByPrefix('runs:');
      const strengthData = loadByPrefix('strength:');
      const dailyData = loadByPrefix('daily:');
      const config = loadConfig();
      setRuns(runsData.sort((a, b) => new Date(a.date) - new Date(b.date)));
      setStrengthSessions(strengthData.sort((a, b) => new Date(a.date) - new Date(b.date)));
      setDailyLogs(dailyData.sort((a, b) => new Date(a.date) - new Date(b.date)));
      if (config) {
        if (config.best5kTime) setBest5kTime(config.best5kTime);
        if (config.weeklyPlan) setWeeklyPlan(config.weeklyPlan);
        if (config.splits) setSplits(config.splits);
        if (config.exercises) setExercises(config.exercises);
      }
    } catch (e) { console.error(e); }
    finally { setLoading(false); }
  };
 
  const loadByPrefix = (prefix) => {
    const result = storage.list(prefix);
    if (!result || !result.keys) return [];
    const items = [];
    for (const key of result.keys) {
      const item = storage.get(key);
      if (item && item.value) { try { items.push(JSON.parse(item.value)); } catch (e) {} }
    }
    return items;
  };
 
  const loadConfig = () => {
    const result = storage.get('config:settings');
    return result ? JSON.parse(result.value) : null;
  };
 
  const saveConfig = (newConfig) => {
    const current = loadConfig() || {};
    const merged = { ...current, ...newConfig };
    storage.set('config:settings', JSON.stringify(merged));
  };
 
  // ============================================
  // LAUF: Speichern mit mm:ss-Parsing
  // ============================================
  const saveRun = () => {
    if (!runForm.distance || !runForm.durationStr) {
      alert('Bitte Distanz und Zeit eingeben');
      return;
    }
    const durationMin = parseTime(runForm.durationStr);
    if (durationMin === null || durationMin <= 0) {
      alert('Zeit ungültig. Format: mm:ss (z.B. 25:30)');
      return;
    }
    const id = editingRunId || `runs:${Date.now()}`;
    const data = {
      id, ...runForm,
      distance: parseFloat(runForm.distance.toString().replace(',', '.')),
      duration: durationMin
    };
    delete data.durationStr;
    storage.set(id, JSON.stringify(data));
    const filtered = runs.filter(r => r.id !== id);
    setRuns([...filtered, data].sort((a, b) => new Date(a.date) - new Date(b.date)));
    setRunForm({ date: new Date().toISOString().split('T')[0], type: 'GA1', distance: '', durationStr: '', notes: '' });
    setEditingRunId(null);
  };
 
  const startEditRun = (run) => {
    setRunForm({
      date: run.date,
      type: run.type,
      distance: run.distance.toString(),
      durationStr: formatMinutesToTime(run.duration), // mm:ss zurückkonvertieren
      notes: run.notes || ''
    });
    setEditingRunId(run.id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
 
  const cancelEditRun = () => {
    setRunForm({ date: new Date().toISOString().split('T')[0], type: 'GA1', distance: '', durationStr: '', notes: '' });
    setEditingRunId(null);
  };
 
  // ============================================
  // KRAFT: Speichern
  // ============================================
  const saveStrength = () => {
    const hasAnyData = strengthForm.exerciseLog.some(ex => ex.sets.some(s => s.weight !== '' || s.reps !== ''));
    if (!hasAnyData) { alert('Bitte mindestens einen Satz ausfüllen'); return; }
    const id = editingStrengthId || `strength:${Date.now()}`;
    const data = { id, ...strengthForm };
    storage.set(id, JSON.stringify(data));
    const filtered = strengthSessions.filter(s => s.id !== id);
    setStrengthSessions([...filtered, data].sort((a, b) => new Date(a.date) - new Date(b.date)));
    // Reset: Template laden für nächste Einheit
    isInitialLoad.current = true;
    setStrengthForm({ date: new Date().toISOString().split('T')[0], type: 'UK', exerciseLog: [], notes: '' });
    setEditingStrengthId(null);
  };
 
  const startEditStrength = (session) => {
    // Template-Reset blockieren - gespeicherte Werte laden
    previousSplitType.current = session.type;
    setStrengthForm({
      date: session.date,
      type: session.type,
      exerciseLog: JSON.parse(JSON.stringify(session.exerciseLog || [])), // Deep copy
      notes: session.notes || ''
    });
    setEditingStrengthId(session.id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
 
  const cancelEditStrength = () => {
    setEditingStrengthId(null);
    isInitialLoad.current = true; // Template neu laden
    setStrengthForm({ date: new Date().toISOString().split('T')[0], type: 'UK', exerciseLog: [], notes: '' });
  };
 
  const updateSet = (exIdx, setIdx, field, value) => {
    setStrengthForm(f => {
      const newLog = [...f.exerciseLog];
      const newSets = [...newLog[exIdx].sets];
      newSets[setIdx] = { ...newSets[setIdx], [field]: value };
      newLog[exIdx] = { ...newLog[exIdx], sets: newSets };
      return { ...f, exerciseLog: newLog };
    });
  };
 
  const addSet = (exIdx) => {
    setStrengthForm(f => {
      const newLog = [...f.exerciseLog];
      const lastSet = newLog[exIdx].sets[newLog[exIdx].sets.length - 1] || { reps: '', weight: '', rir: '' };
      newLog[exIdx] = { ...newLog[exIdx], sets: [...newLog[exIdx].sets, { ...lastSet }] };
      return { ...f, exerciseLog: newLog };
    });
  };
 
  const removeSet = (exIdx, setIdx) => {
    setStrengthForm(f => {
      const newLog = [...f.exerciseLog];
      if (newLog[exIdx].sets.length <= 1) return f;
      newLog[exIdx] = { ...newLog[exIdx], sets: newLog[exIdx].sets.filter((_, i) => i !== setIdx) };
      return { ...f, exerciseLog: newLog };
    });
  };
 
  const saveDaily = () => {
    const id = `daily:${dailyForm.date}`;
    const data = {
      id, ...dailyForm,
      weight: dailyForm.weight ? parseFloat(dailyForm.weight.toString().replace(',', '.')) : null,
      kcal: dailyForm.kcal ? parseInt(dailyForm.kcal) : null,
      protein: dailyForm.protein ? parseInt(dailyForm.protein) : null,
      sleep: dailyForm.sleep ? parseFloat(dailyForm.sleep.toString().replace(',', '.')) : null,
      stress: parseInt(dailyForm.stress)
    };
    storage.set(id, JSON.stringify(data));
    const filtered = dailyLogs.filter(d => d.date !== dailyForm.date);
    setDailyLogs([...filtered, data].sort((a, b) => new Date(a.date) - new Date(b.date)));
    setDailyForm({ date: new Date().toISOString().split('T')[0], weight: '', kcal: '', protein: '', sleep: '', stress: 5 });
    setEditingDailyId(null);
  };
 
  const startEditDaily = (log) => {
    setDailyForm({
      date: log.date,
      weight: log.weight ? log.weight.toString() : '',
      kcal: log.kcal ? log.kcal.toString() : '',
      protein: log.protein ? log.protein.toString() : '',
      sleep: log.sleep ? log.sleep.toString() : '',
      stress: log.stress || 5
    });
    setEditingDailyId(log.id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
 
  const cancelEditDaily = () => {
    setDailyForm({ date: new Date().toISOString().split('T')[0], weight: '', kcal: '', protein: '', sleep: '', stress: 5 });
    setEditingDailyId(null);
  };
 
  const deleteItem = (id, type) => {
    if (!confirm('Wirklich löschen?')) return;
    storage.delete(id);
    if (type === 'run') setRuns(runs.filter(r => r.id !== id));
    if (type === 'strength') setStrengthSessions(strengthSessions.filter(s => s.id !== id));
    if (type === 'daily') setDailyLogs(dailyLogs.filter(d => d.id !== id));
  };
 
  const updatePlanDay = (idx, field, value) => {

  // SPLIT-VERWALTUNG (neue Splits anlegen/löschen)
  // ============================================
  const addSplit = () => {
    const name = prompt('Name des neuen Splits (z.B. "Push", "Pull", "Beine"):');
    if (!name || !name.trim()) return;
    // ID generieren (alphanumerisch, basierend auf Namen)
    const id = name.trim().replace(/[^a-zA-Z0-9]/g, '').toUpperCase() || `S${Date.now()}`;
    if (splits.some(s => s.id === id)) {
      alert('Ein Split mit ähnlichem Namen existiert bereits.');
      return;
    }
    const colors = ['blue', 'purple', 'green', 'orange', 'red', 'pink', 'yellow'];
    const usedColors = splits.map(s => s.color);
    const newColor = colors.find(c => !usedColors.includes(c)) || 'zinc';
    const newSplit = { id, name: name.trim(), shortName: name.trim().slice(0, 3), color: newColor };
    const newSplits = [...splits, newSplit];
    const newExercises = { ...exercises, [id]: [] };
    setSplits(newSplits);
    setExercises(newExercises);
    saveConfig({ splits: newSplits, exercises: newExercises });
    setEditingExerciseSplit(id); // direkt zur Bearbeitung springen
  };
 
  const renameSplit = (splitId) => {
    const split = splits.find(s => s.id === splitId);
    if (!split) return;
    const newName = prompt('Neuer Name:', split.name);
    if (!newName || !newName.trim()) return;
    const newSplits = splits.map(s => s.id === splitId ? { ...s, name: newName.trim(), shortName: newName.trim().slice(0, 3) } : s);
    setSplits(newSplits);
    saveConfig({ splits: newSplits });
  };
 
  const removeSplit = (splitId) => {
    if (splits.length <= 1) { alert('Mindestens ein Split muss bleiben.'); return; }
    const split = splits.find(s => s.id === splitId);
    if (!confirm(`Split "${split.name}" und alle zugehörigen Übungsvorlagen löschen? Bereits gespeicherte Krafteinheiten bleiben erhalten.`)) return;
    const newSplits = splits.filter(s => s.id !== splitId);
    const newExercises = { ...exercises };
    delete newExercises[splitId];
    setSplits(newSplits);
    setExercises(newExercises);
    saveConfig({ splits: newSplits, exercises: newExercises });
    if (editingExerciseSplit === splitId) setEditingExerciseSplit(null);

  const updateExercise = (split, idx, field, value) => {

    setExercises(newExercises);
    saveConfig({ exercises: newExercises });

    saveConfig({ exercises: newExercises });

  const moveExercise = (split, idx, direction) => {
    const newList = [...(exercises[split] || [])];
    const targetIdx = idx + direction;
    if (targetIdx < 0 || targetIdx >= newList.length) return;
    [newList[idx], newList[targetIdx]] = [newList[targetIdx], newList[idx]];

  const update5kTime = (newTime) => {

  const exportData = () => {
    const data = {
      runs: loadByPrefix('runs:'),
      strength: loadByPrefix('strength:'),
      daily: loadByPrefix('daily:'),
      config: loadConfig(),
      exportedAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hybrid-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);

  const importData = (event) => {

    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!confirm('Bestehende Daten werden überschrieben. Fortfahren?')) return;
        ['runs:', 'strength:', 'daily:'].forEach(prefix => {
          loadByPrefix(prefix).forEach(item => storage.delete(item.id));
        });
        (data.runs || []).forEach(r => storage.set(r.id, JSON.stringify(r)));
        (data.strength || []).forEach(s => storage.set(s.id, JSON.stringify(s)));
        (data.daily || []).forEach(d => storage.set(d.id, JSON.stringify(d)));
        if (data.config) storage.set('config:settings', JSON.stringify(data.config));
        loadAllData();
        alert('Import erfolgreich!');
      } catch (e) {
        alert('Import fehlgeschlagen: ' + e.message);
      }
    };
    reader.readAsText(file);
  };
 
  const calculatePace = (distance, duration) => !distance || !duration ? 0 : duration / distance;
  const formatPace = (pace) => {
    if (!pace) return '–';
    const min = Math.floor(pace);
    const sec = Math.round((pace - min) * 60);
    return `${min}:${sec.toString().padStart(2, '0')}`;
  };
  const formatTime = formatMinutesToTime;
 
  const runChartData = runs.map(r => ({
    date: r.date,
    pace: parseFloat(calculatePace(r.distance, r.duration).toFixed(2)),
    distance: r.distance, type: r.type
  }));
 
  const getWeekNumber = (date) => {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  };
 
  const getWeeklyKm = () => {
    const weeks = {};
    runs.forEach(r => {
      const d = new Date(r.date);
      const week = `${d.getFullYear()}-W${getWeekNumber(d)}`;
      weeks[week] = (weeks[week] || 0) + r.distance;
    });
    return Object.entries(weeks).map(([week, km]) => ({ week, km: parseFloat(km.toFixed(1)) }));
  };
 
  const weeklyData = getWeeklyKm();
  const weightData = dailyLogs.filter(d => d.weight).map(d => ({ date: d.date, weight: d.weight }));
  const kcalData = dailyLogs.filter(d => d.kcal).map(d => ({ date: d.date, kcal: d.kcal, protein: d.protein }));
 
  const totalKm = runs.reduce((sum, r) => sum + r.distance, 0);
  const avgPace = runs.length > 0 ? runs.reduce((sum, r) => sum + calculatePace(r.distance, r.duration), 0) / runs.length : 0;
  const lastWeight = dailyLogs.filter(d => d.weight).slice(-1)[0]?.weight;
  const totalSessions = runs.length + strengthSessions.length;
  const recentRuns = runs.slice(-5);
  const bestPace = recentRuns.length > 0 ? Math.min(...recentRuns.map(r => calculatePace(r.distance, r.duration))) : 0;
  const projected10k = bestPace * 10;
  const currentRange = getPaceRange(best5kTime, runForm.type);

              <I name="activity" className="w-6 h-6 text-white" strokeWidth={2.5} />
            </div>
            <div>
              <h1 className="text-base font-bold tracking-tight">HYBRID TRACKER</h1>
              <p className="text-xs text-zinc-500">Sub-40 · Muskelerhalt</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => setShowSettings(true)} className="text-zinc-400 hover:text-orange-500 p-2"><I name="settings" /></button>
            <div className="text-right"><div className="text-xs text-zinc-500">Sessions</div><div className="text-sm font-bold text-orange-500">{totalSessions}</div></div>

            {weeklyData.length > 0 && (

                    <Bar dataKey="km" fill="#f97316" radius={[4, 4, 0, 0]} />

            {weightData.length > 0 && (

            {kcalData.length > 0 && (

                  <BarChart data={kcalData}>

                    <Legend />
                    <Bar dataKey="kcal" fill="#10b981" name="kcal" radius={[4, 4, 0, 0]} />

            {totalSessions === 0 && (
              <div className="bg-zinc-900 rounded-xl border border-zinc-800 border-dashed p-8 text-center">
                <I name="activity" className="w-10 h-10 text-zinc-700 mx-auto mb-3" />
                <p className="text-zinc-400 text-sm">Noch keine Daten. Logge deine erste Einheit!</p>
              </div>
            )}
          </div>
        )}
 
        {activeTab === 'run' && (
          <div className="space-y-4">
            <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-4">
              <h2 className="text-base font-bold mb-3 flex items-center gap-2">
                <I name="plus" className="w-4 h-4 text-orange-500" /> {editingRunId ? 'Bearbeiten' : 'Neue Laufeinheit'}
              </h2>
              <div className="space-y-3">
                <FormField label="Datum">
                  <input type="date" value={runForm.date} onChange={e => setRunForm({...runForm, date: e.target.value})}
                    className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-100 w-full" />
                </FormField>
                <FormField label="Einheitstyp">
                  <select value={runForm.type} onChange={e => setRunForm({...runForm, type: e.target.value})}
                    className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-100 w-full">
                    <option value="GA1">GA1 (locker)</option>
                    <option value="GA2">GA2 (zügig)</option>

                <div className="bg-blue-500/5 border border-blue-500/20 rounded-lg p-3">
                  <div className="flex items-start gap-2">
                    <I name="info" className="w-4 h-4 text-blue-400 mt-0.5 flex-shrink-0" />
                    <div className="flex-1 text-sm">
                      <div className="flex items-baseline gap-2 flex-wrap">

                      <p className="text-zinc-400 text-xs mt-1">{currentRange.desc}</p>

                      className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-100 w-full" />
                  </FormField>

                  <textarea value={runForm.notes} onChange={e => setRunForm({...runForm, notes: e.target.value})}

                </FormField>

              {runForm.distance && runForm.durationStr && (() => {
                const duration = parseTime(runForm.durationStr);

                if (!duration || !dist) return null;
                const actualPace = calculatePace(dist, duration);

        {activeTab === 'strength' && (

              </h2>
              <div className="grid grid-cols-2 gap-3">
                <FormField label="Datum">
                  <input type="date" value={strengthForm.date} onChange={e => setStrengthForm({...strengthForm, date: e.target.value})}
                    className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-100 w-full" />
                </FormField>

                </FormField>
              </div>
 
              {strengthForm.exerciseLog.length === 0 && (
                <div className="mt-4 bg-yellow-500/5 border border-yellow-500/20 rounded-lg p-3 text-sm text-yellow-300">
                  Für "{getSplitInfo(strengthForm.type).name}" sind noch keine Übungen hinterlegt. Lege Übungen im <button onClick={() => { setActiveTab('plan'); setEditingExerciseSplit(strengthForm.type); }} className="underline font-semibold">Wochenplan-Tab</button> an.
                </div>
              )}
 
              <div className="mt-4 space-y-3">
                {strengthForm.exerciseLog.map((ex, exIdx) => (
                  <div key={exIdx} className="bg-zinc-800/50 rounded-lg p-3 border border-zinc-800">
                    <div className="flex items-center justify-between mb-2">
                      <div>
                        <h3 className="font-semibold text-sm">{ex.name}</h3>
                        <p className="text-xs text-zinc-500">{ex.plannedSets}×{ex.repsTarget} · RIR {ex.rirTarget ?? '–'}</p>
                      </div>
                      <button onClick={() => addSet(exIdx)} className="text-xs bg-zinc-700 text-zinc-200 px-2 py-1 rounded flex items-center gap-1">
                        <I name="plus" className="w-3 h-3" />Satz
                      </button>
                    </div>
                    <div className="space-y-2">
                      <div className="grid grid-cols-12 gap-1 text-xs text-zinc-500">
                        <div className="col-span-1">#</div>
                        <div className="col-span-3">kg</div>
                        <div className="col-span-3">Wdh.</div>
                        <div className="col-span-3">RIR</div>
                        <div className="col-span-2"></div>
                      </div>
                      {ex.sets.map((s, setIdx) => (
                        <div key={setIdx} className="grid grid-cols-12 gap-1 items-center">
                          <div className="col-span-1 text-zinc-400 text-xs font-mono">{setIdx + 1}</div>
                          <input type="text" inputMode="decimal" value={s.weight}
                            onChange={e => {
                              const v = e.target.value.replace(',', '.');
                              if (/^\d*\.?\d*$/.test(v)) updateSet(exIdx, setIdx, 'weight', v);
                            }}
                            placeholder="kg" className="col-span-3 bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm" />
                          <input type="text" value={s.reps}
                            onChange={e => updateSet(exIdx, setIdx, 'reps', e.target.value)}
                            placeholder={ex.repsTarget} className="col-span-3 bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm" />
                          <input type="text" inputMode="numeric" value={s.rir}
                            onChange={e => {
                              if (/^\d{0,2}$/.test(e.target.value)) updateSet(exIdx, setIdx, 'rir', e.target.value);
                            }}
                            placeholder="RIR" className="col-span-3 bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm" />
                          <div className="col-span-2 flex justify-end">
                            {ex.sets.length > 1 && (
                              <button onClick={() => removeSet(exIdx, setIdx)} className="text-zinc-500 p-1"><I name="x" className="w-4 h-4" /></button>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
 
              <FormField label="Notizen">
                <textarea value={strengthForm.notes} onChange={e => setStrengthForm({...strengthForm, notes: e.target.value})}
                  className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-100 w-full mt-3" rows="2" placeholder="Anmerkungen..." />
              </FormField>
 
              <div className="mt-4 flex gap-2">
                <button onClick={saveStrength} className="bg-orange-500 hover:bg-orange-600 text-white font-semibold px-5 py-2.5 rounded-lg flex-1">
                  {editingStrengthId ? 'Speichern' : 'Speichern'}
                </button>
                {editingStrengthId && <button onClick={cancelEditStrength} className="bg-zinc-700 text-zinc-200 px-4 py-2.5 rounded-lg">Abbrechen</button>}
              </div>
            </div>
 
            <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-4">
              <h2 className="text-base font-bold mb-3">Verlauf ({strengthSessions.length})</h2>
              <div className="space-y-3">
                {strengthSessions.slice().reverse().map(s => {
                  const splitInfo = getSplitInfo(s.type);
                  return (
                    <div key={s.id} className={`rounded-lg p-3 ${editingStrengthId === s.id ? 'bg-orange-500/10 border border-orange-500/40' : 'bg-zinc-800/50'}`}>
                      <div className="flex items-center justify-between mb-2">
                        <div className="flex items-center gap-2">
                          <span className={`text-xs px-2 py-0.5 rounded ${SPLIT_COLORS[splitInfo.color] || SPLIT_COLORS.zinc}`}>{splitInfo.shortName}</span>
                          <span className="text-xs text-zinc-400">{s.date}</span>
                        </div>
                        <div className="flex gap-1">
                          <button onClick={() => startEditStrength(s)} className="text-zinc-500 p-1"><I name="pencil" className="w-4 h-4" /></button>
                          <button onClick={() => deleteItem(s.id, 'strength')} className="text-zinc-500 p-1"><I name="trash" className="w-4 h-4" /></button>
                        </div>
                      </div>
                      {s.exerciseLog && s.exerciseLog.length > 0 && (
                        <div className="space-y-1">
                          {s.exerciseLog.map((ex, i) => {
                            const filledSets = ex.sets.filter(set => set.weight || set.reps);
                            if (filledSets.length === 0) return null;
                            return (
                              <div key={i} className="text-xs">
                                <div className="font-medium text-zinc-200">{ex.name}</div>
                                <div className="text-zinc-400 font-mono ml-2">
                                  {filledSets.map((set, j) => (
                                    <span key={j}>{j > 0 && ' · '}{set.weight || '–'}kg×{set.reps || '–'}{set.rir !== '' ? ` (RIR${set.rir})` : ''}</span>
                                  ))}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                      {s.notes && <p className="text-xs text-zinc-500 mt-1 italic">📝 {s.notes}</p>}
                    </div>
                  );
                })}
                {strengthSessions.length === 0 && <p className="text-zinc-500 text-sm">Noch keine Krafteinheiten.</p>}
              </div>
            </div>
          </div>
        )}
 
        {activeTab === 'daily' && (
          <div className="space-y-4">
            <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-4">
              <h2 className="text-base font-bold mb-3 flex items-center gap-2">
                <I name="plus" className="w-4 h-4 text-orange-500" /> {editingDailyId ? 'Bearbeiten' : 'Tageswerte'}
              </h2>
              <div className="space-y-3">
                <FormField label="Datum">
                  <input type="date" value={dailyForm.date} onChange={e => setDailyForm({...dailyForm, date: e.target.value})}
                    className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-100 w-full" />
                </FormField>
                <div className="grid grid-cols-2 gap-3">
                  <FormField label="Gewicht (kg)">
                    <input type="text" inputMode="decimal" value={dailyForm.weight}
                      onChange={e => { const v = e.target.value.replace(',', '.'); if (/^\d*\.?\d*$/.test(v)) setDailyForm({...dailyForm, weight: v}); }}
                      className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-100 w-full" placeholder="99.5" />
                  </FormField>
                  <FormField label="kcal">
                    <input type="text" inputMode="numeric" value={dailyForm.kcal}
                      onChange={e => { if (/^\d*$/.test(e.target.value)) setDailyForm({...dailyForm, kcal: e.target.value}); }}
                      className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-100 w-full" placeholder="2400" />
                  </FormField>
                  <FormField label="Protein (g)">
                    <input type="text" inputMode="numeric" value={dailyForm.protein}
                      onChange={e => { if (/^\d*$/.test(e.target.value)) setDailyForm({...dailyForm, protein: e.target.value}); }}
                      className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-100 w-full" placeholder="180" />
                  </FormField>
                  <FormField label="Schlaf (h)">
                    <input type="text" inputMode="decimal" value={dailyForm.sleep}
                      onChange={e => { const v = e.target.value.replace(',', '.'); if (/^\d*\.?\d*$/.test(v)) setDailyForm({...dailyForm, sleep: v}); }}
                      className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-100 w-full" placeholder="7.5" />
                  </FormField>
                </div>
                <FormField label={`Stress: ${dailyForm.stress}/10`}>
                  <input type="range" min="1" max="10" value={dailyForm.stress} onChange={e => setDailyForm({...dailyForm, stress: e.target.value})}
                    className="w-full accent-orange-500" />
                </FormField>
              </div>
              <div className="mt-4 flex gap-2">
                <button onClick={saveDaily} className="bg-orange-500 text-white font-semibold px-5 py-2.5 rounded-lg flex-1">Speichern</button>
                {editingDailyId && <button onClick={cancelEditDaily} className="bg-zinc-700 text-zinc-200 px-4 py-2.5 rounded-lg">Abbrechen</button>}
              </div>
            </div>
 
            <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-4">
              <h2 className="text-base font-bold mb-3">Verlauf ({dailyLogs.length})</h2>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="text-left text-zinc-500 border-b border-zinc-800 text-xs">
                      <th className="py-2 pr-2">Datum</th>
                      <th className="py-2 pr-2">kg</th>
                      <th className="py-2 pr-2">kcal</th>
                      <th className="py-2 pr-2">Prot.</th>
                      <th className="py-2 pr-2">Schl.</th>
                      <th className="py-2"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {dailyLogs.slice().reverse().map(d => (
                      <tr key={d.id} className={`border-b border-zinc-800/50 text-xs ${editingDailyId === d.id ? 'bg-orange-500/10' : ''}`}>
                        <td className="py-2 pr-2 text-zinc-300">{d.date.slice(5)}</td>
                        <td className="py-2 pr-2">{d.weight || '–'}</td>
                        <td className="py-2 pr-2">{d.kcal || '–'}</td>
                        <td className="py-2 pr-2">{d.protein || '–'}</td>
                        <td className="py-2 pr-2">{d.sleep || '–'}</td>
                        <td className="py-2">
                          <div className="flex gap-1">
                            <button onClick={() => startEditDaily(d)} className="text-zinc-500"><I name="pencil" className="w-3.5 h-3.5" /></button>
                            <button onClick={() => deleteItem(d.id, 'daily')} className="text-zinc-500"><I name="trash" className="w-3.5 h-3.5" /></button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {dailyLogs.length === 0 && <p className="text-zinc-500 text-sm py-4">Noch keine Werte.</p>}
              </div>
            </div>
          </div>
        )}
 
        {activeTab === 'plan' && (
          <div className="space-y-4">
            <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-4">
              <h2 className="text-base font-bold">Wochenplan</h2>
              <p className="text-xs text-zinc-500 mb-3">Tippe auf einen Tag zum Bearbeiten</p>
              <div className="grid grid-cols-1 gap-2">
                {weeklyPlan.map((d, i) => <PlanDayCard key={i} day={d} idx={i} splits={splits} onUpdate={updatePlanDay} />)}
              </div>
            </div>
 
            <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-4">
              <div className="flex items-center justify-between mb-1">
                <h2 className="text-base font-bold">Trainingssplits & Übungen</h2>
                <button onClick={addSplit} className="text-xs bg-orange-500 text-white px-3 py-1.5 rounded-lg flex items-center gap-1">
                  <I name="plus" className="w-3.5 h-3.5" /> Neuer Split
                </button>
              </div>
              <p className="text-xs text-zinc-500 mb-3">Übungen erscheinen automatisch im Kraft-Tab</p>
 
              <div className="flex gap-2 mb-3 flex-wrap">
                {splits.map(split => (
                  <button key={split.id} onClick={() => setEditingExerciseSplit(editingExerciseSplit === split.id ? null : split.id)}
                    className={`px-3 py-2 rounded-lg text-sm ${editingExerciseSplit === split.id ? 'bg-orange-500 text-white' : 'bg-zinc-800 text-zinc-300'}`}>
                    {split.name}
                  </button>
                ))}
              </div>
 
              {editingExerciseSplit && (
                <>
                  <div className="flex items-center justify-between mb-2 p-2 bg-zinc-800/50 rounded-lg">
                    <span className="text-sm text-zinc-300">
                      <span className="text-zinc-500">Bearbeiten:</span> <span className="font-semibold">{getSplitInfo(editingExerciseSplit).name}</span>
                    </span>
                    <div className="flex gap-1">
                      <button onClick={() => renameSplit(editingExerciseSplit)} className="text-xs text-zinc-400 hover:text-orange-500 px-2 py-1">
                        Umbenennen
                      </button>
                      <button onClick={() => removeSplit(editingExerciseSplit)} className="text-xs text-zinc-400 hover:text-red-500 px-2 py-1">
                        Löschen
                      </button>
                    </div>
                  </div>
 
                  <div className="space-y-2">
                    {(exercises[editingExerciseSplit] || []).map((ex, idx) => (
                      <div key={idx} className="bg-zinc-800/50 rounded-lg p-2 space-y-1">
                        <input type="text" value={ex.name}
                          onChange={e => updateExercise(editingExerciseSplit, idx, 'name', e.target.value)}
                          className="bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm w-full" />
                        <div className="grid grid-cols-12 gap-1">
                          <input type="number" inputMode="numeric" min="1" max="10" value={ex.sets}
                            onChange={e => updateExercise(editingExerciseSplit, idx, 'sets', e.target.value)}
                            className="col-span-3 bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm" placeholder="Sätze" />
                          <input type="text" value={ex.repsTarget}
                            onChange={e => updateExercise(editingExerciseSplit, idx, 'repsTarget', e.target.value)}
                            className="col-span-4 bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm" placeholder="Wdh." />
                          <input type="number" inputMode="numeric" min="0" max="10" value={ex.rirTarget}
                            onChange={e => updateExercise(editingExerciseSplit, idx, 'rirTarget', e.target.value)}
                            className="col-span-3 bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm" placeholder="RIR" />
                          <div className="col-span-2 flex justify-end gap-1 items-center">
                            <button onClick={() => moveExercise(editingExerciseSplit, idx, -1)} className="text-zinc-500 text-xs">▲</button>
                            <button onClick={() => moveExercise(editingExerciseSplit, idx, 1)} className="text-zinc-500 text-xs">▼</button>
                            <button onClick={() => removeExercise(editingExerciseSplit, idx)} className="text-zinc-500"><I name="x" className="w-4 h-4" /></button>
                          </div>
                        </div>
                      </div>
                    ))}
                    {(exercises[editingExerciseSplit] || []).length === 0 && (
                      <p className="text-xs text-zinc-500 text-center py-3">Noch keine Übungen. Lege welche an!</p>
                    )}
                    <button onClick={() => addExercise(editingExerciseSplit)}
                      className="w-full bg-zinc-800 text-zinc-300 text-sm py-2 rounded-lg flex items-center justify-center gap-2">
                      <I name="plus" className="w-4 h-4" /> Übung hinzufügen
                    </button>
                  </div>
                </>
              )}
            </div>
          </div>
        )}
      </main>
 
      {showSettings && (
        <div className="fixed inset-0 bg-black/70 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={() => setShowSettings(false)}>
          <div className="bg-zinc-900 border border-zinc-800 rounded-t-xl sm:rounded-xl max-w-md w-full p-5 max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()} style={{ paddingBottom: 'calc(1.25rem + env(safe-area-inset-bottom))' }}>
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-lg font-bold">Einstellungen</h2>
              <button onClick={() => setShowSettings(false)} className="text-zinc-500"><I name="x" /></button>
            </div>
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-zinc-300 mb-1">5-km-Bestwert (Min)</label>
                <input type="number" inputMode="decimal" step="0.5" min="14" max="40" value={best5kTime}
                  onChange={e => update5kTime(parseFloat(e.target.value))}
                  className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-zinc-100 w-full" />
                <p className="text-xs text-zinc-500 mt-1">Aktuell: {formatTime(best5kTime)} min</p>
              </div>
              <div className="bg-blue-500/5 border border-blue-500/20 rounded-lg p-3 text-xs text-blue-200">
                <p className="font-semibold mb-1">Pace-Bereiche:</p>
                {Object.keys(PACE_FACTORS).map(type => {
                  const r = getPaceRange(best5kTime, type);
                  return (
                    <div key={type} className="flex justify-between py-0.5">
                      <span>{r.name}</span>
                      <span className="font-mono">{formatPace(r.minPace)}–{formatPace(r.maxPace)}/km</span>
                    </div>
                  );
                })}
              </div>
              <div className="border-t border-zinc-800 pt-4 space-y-2">
                <h3 className="text-sm font-semibold text-zinc-300">Daten-Backup</h3>
                <button onClick={exportData} className="w-full bg-zinc-800 text-zinc-200 py-2.5 rounded-lg text-sm flex items-center justify-center gap-2">
                  <I name="save" className="w-4 h-4" /> Daten exportieren (JSON)
                </button>
                <label className="block w-full bg-zinc-800 text-zinc-200 py-2.5 rounded-lg text-sm text-center cursor-pointer">
                  📥 Daten importieren
                  <input type="file" accept=".json" onChange={importData} className="hidden" />
                </label>
                <p className="text-xs text-zinc-500">Sichere deine Daten regelmäßig in iCloud!</p>
              </div>
            </div>
          </div>
        </div>
      )}
 
      <footer className="border-t border-zinc-800 mt-8 py-4 text-center text-xs text-zinc-600" style={{ paddingBottom: 'calc(1rem + env(safe-area-inset-bottom))' }}>
        Hybrid Tracker v2.2 · Daten lokal in Safari
      </footer>
    </div>
  );
}
 
function KPICard({ icon, label, value, unit, color }) {
  const colors = { orange: 'text-orange-500 bg-orange-500/10', green: 'text-green-500 bg-green-500/10', blue: 'text-blue-500 bg-blue-500/10', red: 'text-red-500 bg-red-500/10' };
  return (
    <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-3">
      <div className={`w-8 h-8 rounded-lg flex items-center justify-center mb-2 ${colors[color]}`}><I name={icon} className="w-4 h-4" /></div>
      <div className="text-xs text-zinc-500 uppercase tracking-wider">{label}</div>
      <div className="flex items-baseline gap-1 mt-0.5">
        <span className="text-xl font-bold">{value}</span>
        <span className="text-xs text-zinc-500">{unit}</span>
      </div>
    </div>
  );
}
 
function FormField({ label, children }) {
  return (
    <div>
      <label className="block text-xs font-medium text-zinc-400 mb-1">{label}</label>
      {children}
    </div>
  );
}
 
function PlanDayCard({ day, idx, splits, onUpdate }) {
  const [editing, setEditing] = useState(false);
  const colorClasses = {
    gray: 'bg-zinc-800/30 border-zinc-800',
    orange: 'bg-orange-500/10 border-orange-500/30',
    green: 'bg-green-500/10 border-green-500/30',
    red: 'bg-red-500/10 border-red-500/30'
  };
  if (editing) {
    return (
      <div className={`rounded-lg p-3 border ${colorClasses[day.color] || 'bg-zinc-800'} space-y-2`}>
        <div className="flex items-center justify-between">
          <div className="text-xs font-bold text-zinc-400 uppercase">{day.day}</div>
          <button onClick={() => setEditing(false)} className="text-orange-500 text-xs flex items-center gap-1">
            <I name="save" className="w-3 h-3" /> Fertig
          </button>
        </div>
        <input type="text" value={day.session}
          onChange={e => onUpdate(idx, 'session', e.target.value)}
          className="bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm w-full" placeholder="Session" />
        <input type="text" value={day.detail}
          onChange={e => onUpdate(idx, 'detail', e.target.value)}
          className="bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-xs w-full" placeholder="Details" />
        <div className="grid grid-cols-2 gap-2">
          <select value={day.splitType || ''} onChange={e => onUpdate(idx, 'splitType', e.target.value || null)}
            className="bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-xs">
            <option value="">Kein Split</option>
            {splits.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <select value={day.color} onChange={e => onUpdate(idx, 'color', e.target.value)}
            className="bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-xs">
            <option value="gray">Pause</option>
            <option value="green">Lauf locker</option>
            <option value="orange">Kraft</option>
            <option value="red">Lauf intensiv</option>
          </select>
        </div>
      </div>
    );
  }
  return (
    <div onClick={() => setEditing(true)}
      className={`rounded-lg p-3 border cursor-pointer ${colorClasses[day.color] || 'bg-zinc-800'} flex items-center justify-between`}>
      <div className="flex items-center gap-3">
        <div className="text-xs font-bold text-zinc-400 uppercase w-8">{day.day}</div>
        <div>
          <div className="font-semibold text-sm">{day.session}</div>
          <div className="text-xs text-zinc-500">{day.detail}</div>
        </div>
      </div>
      {day.splitType && <div className="text-xs text-orange-400 font-medium">{day.splitType}</div>}
    </div>
  );
}
 
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<HybridTracker />);
</script>
</body>
</html>
